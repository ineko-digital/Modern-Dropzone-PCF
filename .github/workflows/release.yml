name: Build managed solution and publish GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install .NET 10
        run: |
          curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          sudo bash /tmp/dotnet-install.sh --channel 10.0 --install-dir /usr/share/dotnet
          echo "DOTNET_ROOT=/usr/share/dotnet" >> "$GITHUB_ENV"
          echo "DOTNET_ROOT_X64=/usr/share/dotnet" >> "$GITHUB_ENV"
          echo "/usr/share/dotnet" >> "$GITHUB_PATH"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install Power Platform CLI (pac)
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool || dotnet tool update --global Microsoft.PowerApps.CLI.Tool
          pac --version

      - name: Build PCF
        run: |
          npm ci
          npm run build -- --buildMode production

      - name: Pack managed solution
        run: |
          mkdir -p out
          pac solution pack \
            --folder ./Solution/ModernDropzone/src \
            --zipfile ./out/ModernDropzone_managed.zip \
            --packagetype Managed

      - name: Verify managed zip structure
        run: |
          python3 - <<'PY'
          import sys
          import zipfile

          zip_path = "out/ModernDropzone_managed.zip"
          required = {"solution.xml", "customizations.xml", "[Content_Types].xml"}

          with zipfile.ZipFile(zip_path, "r") as zf:
              root_entries = {
                  name.rstrip("/")
                  for name in zf.namelist()
                  if name and "/" not in name.rstrip("/")
              }

          print("ZIP root entries:")
          for entry in sorted(root_entries):
              print(f" - {entry}")

          missing = sorted(required - root_entries)
          if missing:
              print("Missing required root entries:", ", ".join(missing))
              sys.exit(1)

          print("All required root entries are present.")
          PY

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            out/ModernDropzone_managed.zip
